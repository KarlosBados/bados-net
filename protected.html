<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Chráněná sekce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box" id="loginBox">
    <h2>Vstup do chráněné sekce</h2>
    <input type="password" id="passwordInput" placeholder="Zadejte heslo">
    <button onclick="checkPassword()">Potvrdit</button>
    <p id="error" style="color:red;"></p>
</div>

<div class="box" id="content">
    <h2>Chráněný obsah</h2>
    <p>Zde můžeš vkládat odkazy na alba, sdílené soubory, dokumenty…</p>

    <h3>📁 Sdílené odkazy</h3>
    <div id="links">
        <a href="#" target="_blank">Ukázkový odkaz 1</a>
        <a href="#" target="_blank">Ukázkový odkaz 2</a>
    </div>

    <p style="margin-top:30px; color:#888;">Automatické odhlášení po 10 minutách nečinnosti</p>
</div>

<script>
    const VALID_HASHES = [
        "b8c8c1f7c8d9b0c9c0e7a8e3d3b7c0a3e2c1d7f8f0b9a6c4d1e8f7b3c9a2d4"
    ];

    let logoutTimer;

    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
    }

    async function checkPassword() {
        const input = document.getElementById("passwordInput").value;
        const inputHash = await sha256(input);

        if (VALID_HASHES.includes(inputHash)) {
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("content").style.display = "block";
            startAutoLogout();
        } else {
            document.getElementById("error").textContent = "Nesprávné heslo.";
        }
    }

    function startAutoLogout() {
        resetTimer();
        document.onmousemove = resetTimer;
        document.onkeypress = resetTimer;
        document.onclick = resetTimer;
    }

    function resetTimer() {
        clearTimeout(logoutTimer);
        logoutTimer = setTimeout(logout, 10 * 60 * 1000);
    }

    function logout() {
        document.getElementById("content").style.display = "none";
        document.getElementById("loginBox").style.display = "block";
        document.getElementById("passwordInput").value = "";
        document.getElementById("error").textContent = "Byl jste automaticky odhlášen.";
    }
</script>

</body>
</html>
