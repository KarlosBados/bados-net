<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Chráněná sekce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box" id="loginBox">
    <h2>Chráněná sekce</h2>
    <input type="password" id="passwordInput" placeholder="Zadejte heslo">
    <button onclick="checkPassword()">Potvrdit</button>
    <p id="error" style="color:red;"></p>
</div>

<div class="box" id="content" style="display:none;">
    <h2>Chráněný obsah</h2>
    <p>Zde můžeš vkládat odkazy na alba, dokumenty, soubory…</p>

    <div id="links">
        <a href="#" target="_blank">Ukázkový odkaz 1</a><br>
        <a href="#" target="_blank">Ukázkový odkaz 2</a>
    </div>

    <p style="margin-top:20px; color:#777;">Automatické odhlášení po 10 minutách nečinnosti.</p>
</div>

<script>
    const VALID_HASH = "897fac0e089f3f54ec59eba11913b09907f1831ef9d5297799928954ccf55a88";
    let logoutTimer;

    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
    }

    async function checkPassword() {
        const input = document.getElementById("passwordInput").value.trim();
        const inputHash = await sha256(input);

        if (inputHash === VALID_HASH) {
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("content").style.display = "block";
            document.getElementById("error").textContent = "";
            startAutoLogout();
        } else {
            document.getElementById("error").textContent = "Nesprávné heslo.";
        }
    }

    // ENTER potvrzení
    document.getElementById("passwordInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            checkPassword();
        }
    });

    function startAutoLogout() {
        resetTimer();
        document.onmousemove = resetTimer;
        document.onkeypress = resetTimer;
        document.onclick = resetTimer;
    }

    function resetTimer() {
        clearTimeout(logoutTimer);
        logoutTimer = setTimeout(logout, 10 * 60 * 1000);
    }

    function logout() {
        document.getElementById("content").style.display = "none";
        document.getElementById("loginBox").style.display = "block";
        document.getElementById("passwordInput").value = "";
        document.getElementById("error").textContent = "Byl jste automaticky odhlášen.";
    }
</script>

</body>
</html>
