<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rodinné FOTO</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box" id="loginBox">
    <h2>Rodinné FOTO</h2>

    <input type="password" id="passwordInput" placeholder="Zadejte heslo">
    <button onclick="checkPassword()">Potvrdit</button>
    <p id="error" style="color:red;"></p>

    <button class="back-btn" onclick="window.location.href='index.html'">Zpět</button>
</div>

<div class="box" id="content" style="display:none;">
    <h2>Rodinná fotoalba</h2>

    <ul class="link-list">
        <li class="photo-link">
            <span class="link-icon">📌</span>
            <a href="https://photos.app.goo.gl/ASjX9mhJzUvDRR327" target="_blank">
                Snad tu něco brzy přidám...
            </a>
        </li>
    </ul>

    <hr>

    <h3>Roky</h3>

    <ul class="year-list">
        <li><a href="#2024">2024</a></li>
        <li><a href="#2023">2023</a></li>
        <li><a href="#2022">2022</a></li>
    </ul>

    <hr>

    <h3 id="2024">📅 2024</h3>
    <ul class="photo-list">
        <li>
            <span class="link-icon">📸</span>
            <a href="https://photos.app.goo.gl/ASjX9mhJzUvDRR327" target="_blank">
                Zatím žádné fotky pro rok 2024
            </a>
        </li>
    </ul>

    <h3 id="2023">📅 2023</h3>
    <ul class="photo-list">
        <li>
            <span class="link-icon">📸</span>
            <a href="https://photos.app.goo.gl/ASjX9mhJzUvDRR327" target="_blank">
                Zatím žádné fotky pro rok 2023
            </a>
        </li>
    </ul>

    <h3 id="2022">📅 2022</h3>
    <ul class="photo-list">
        <li>
            <span class="link-icon">📸</span>
            <a href="https://photos.app.goo.gl/ASjX9mhJzUvDRR327" target="_blank">
                Zatím žádné fotky pro rok 2022
            </a>
        </li>
    </ul>

    <button class="back-btn" onclick="window.location.href='index.html'">Zpět</button>
</div>

<script>
    const VALID_HASH = "216412e210df2f7706094717b66ffc68e412edd6103ecf82d6e34465844aaf83";
    let logoutTimer;

    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
    }

    async function checkPassword() {
        const input = passwordInput.value.trim();
        const inputHash = await sha256(input);

        if (inputHash === VALID_HASH) {
            loginBox.style.display = "none";
            content.style.display = "block";
            error.textContent = "";
            startAutoLogout();
        } else {
            error.textContent = "Nesprávné heslo.";
        }
    }

    passwordInput.addEventListener("keypress", e => {
        if (e.key === "Enter") checkPassword();
    });

    function startAutoLogout() {
        resetTimer();
        document.onmousemove = resetTimer;
        document.onkeypress = resetTimer;
        document.onclick = resetTimer;
    }

    function resetTimer() {
        clearTimeout(logoutTimer);
        logoutTimer = setTimeout(logout, 10 * 60 * 1000);
    }

    function logout() {
        content.style.display = "none";
        loginBox.style.display = "block";
        passwordInput.value = "";
        error.textContent = "Byl jste automaticky odhlášen.";
    }
</script>

</body>
</html>
