<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Rodinná sekce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box" id="loginBox">
    <h2>Rodinná sekce</h2>
    <input type="password" id="passwordInput" placeholder="Zadejte heslo">
    <button onclick="checkPassword()">Potvrdit</button>
    <p id="error" style="color:red;"></p>
</div>

<div class="box" id="content" style="display:none;">
    <h2>Rodinné odkazy</h2>
    <p>Zde můžeš vkládat rodinná alba, sdílené fotky, dokumenty…</p>
    <div id="links">
        <a href="#" target="_blank">Ukázkový rodinný odkaz</a>
    </div>
</div>

<script>
    const VALID_PASSWORDS = ["Moly"];

    function checkPassword() {
        const input = document.getElementById("passwordInput").value.trim();

        if (VALID_PASSWORDS.includes(input)) {
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("content").style.display = "block";
            document.getElementById("error").textContent = "";
        } else {
            document.getElementById("error").textContent = "Nesprávné heslo.";
        }
    }
</script>

</body>
</html>
